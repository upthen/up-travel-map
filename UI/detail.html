<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>城市详情 · 足迹中国</title>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=LXGW+WenKai:wght@300;400;700&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="styles.css"
		/>
		<link
			rel="stylesheet"
			href="detail.css"
		/>
	</head>
	<body>
		<div id="app">
			<div class="global-controls">
				<button
					id="theme-toggle"
					class="control-btn"
					title="切换主题"
				>
					<svg
						class="icon-sun"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
					>
						<circle
							cx="12"
							cy="12"
							r="5"
						/>
						<line
							x1="12"
							y1="1"
							x2="12"
							y2="3"
						/>
						<line
							x1="12"
							y1="21"
							x2="12"
							y2="23"
						/>
						<line
							x1="4.22"
							y1="4.22"
							x2="5.64"
							y2="5.64"
						/>
						<line
							x1="18.36"
							y1="18.36"
							x2="19.78"
							y2="19.78"
						/>
						<line
							x1="1"
							y1="12"
							x2="3"
							y2="12"
						/>
						<line
							x1="21"
							y1="12"
							x2="23"
							y2="12"
						/>
						<line
							x1="4.22"
							y1="19.78"
							x2="5.64"
							y2="18.36"
						/>
						<line
							x1="18.36"
							y1="5.64"
							x2="19.78"
							y2="4.22"
						/>
					</svg>
					<svg
						class="icon-moon"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
					>
						<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
					</svg>
				</button>
				<button
					id="music-toggle"
					class="control-btn"
					title="音乐控制"
				>
					<svg
						class="icon-volume"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
					>
						<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
						<path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" />
					</svg>
					<svg
						class="icon-mute"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
					>
						<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
						<line
							x1="23"
							y1="9"
							x2="17"
							y2="15"
						/>
						<line
							x1="17"
							y1="9"
							x2="23"
							y2="15"
						/>
					</svg>
				</button>
				<div class="accent-picker-wrap">
					<button
						id="accent-toggle"
						class="control-btn"
						title="主题色"
					>
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.5"
						>
							<circle
								cx="12"
								cy="12"
								r="10"
							/>
							<circle
								id="accent-preview"
								cx="12"
								cy="12"
								r="5"
								fill="var(--accent)"
								stroke="none"
							/>
						</svg>
					</button>
					<div
						id="accent-panel"
						class="accent-panel"
					>
						<div
							class="accent-option active"
							data-accent="cinnabar"
							title="朱砂红"
						></div>
						<div
							class="accent-option"
							data-accent="turquoise"
							title="松石青"
						></div>
						<div
							class="accent-option"
							data-accent="amber"
							title="琥珀金"
						></div>
						<div
							class="accent-option"
							data-accent="jade"
							title="墨翠绿"
						></div>
						<div
							class="accent-option"
							data-accent="indigo"
							title="靛蓝"
						></div>
						<div
							class="accent-option"
							data-accent="rosewood"
							title="紫檀"
						></div>
					</div>
				</div>
			</div>

			<main class="detail-page">
				<nav class="detail-nav">
					<a
						href="index.html"
						class="back-btn"
					>
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.5"
						>
							<line
								x1="19"
								y1="12"
								x2="5"
								y2="12"
							/>
							<polyline points="12 19 5 12 12 5" />
						</svg>
						<span>返回地图</span>
					</a>
				</nav>

				<header
					id="detail-hero"
					class="detail-hero"
				>
					<div class="hero-bg">
						<img
							id="hero-bg-image"
							src=""
							alt=""
						/>
						<div class="hero-bg-overlay"></div>
					</div>
					<div class="hero-content">
						<div
							class="hero-seal"
							id="hero-seal"
						>
							京
						</div>
						<h1
							id="hero-city-name"
							class="hero-city-name"
						></h1>
						<div class="hero-meta">
							<div class="hero-meta-item">
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="1.5"
								>
									<rect
										x="3"
										y="4"
										width="18"
										height="18"
										rx="2"
										ry="2"
									/>
									<line
										x1="16"
										y1="2"
										x2="16"
										y2="6"
									/>
									<line
										x1="8"
										y1="2"
										x2="8"
										y2="6"
									/>
									<line
										x1="3"
										y1="10"
										x2="21"
										y2="10"
									/>
								</svg>
								<span id="hero-time"></span>
							</div>
							<div class="hero-meta-divider"></div>
							<div class="hero-meta-item">
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="1.5"
								>
									<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
									<circle
										cx="9"
										cy="7"
										r="4"
									/>
									<path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
								</svg>
								<span id="hero-companions"></span>
							</div>
							<div class="hero-meta-divider"></div>
							<div class="hero-meta-item">
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="1.5"
								>
									<rect
										x="3"
										y="3"
										width="18"
										height="18"
										rx="2"
										ry="2"
									/>
									<circle
										cx="8.5"
										cy="8.5"
										r="1.5"
									/>
									<polyline points="21 15 16 10 5 21" />
								</svg>
								<span id="hero-photo-count"></span> 张照片
							</div>
							<div class="hero-meta-divider"></div>
							<div class="hero-meta-item">
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="1.5"
								>
									<circle
										cx="12"
										cy="12"
										r="10"
									/>
									<polyline points="12 6 12 12 16 14" />
								</svg>
								<span id="hero-days"></span> 天
							</div>
						</div>
						<p
							id="hero-description"
							class="hero-description"
						></p>
					</div>
				</header>

				<section
					id="records-section"
					class="records-section"
				>
					<div class="records-header">
						<span class="records-header-line"></span>
						<h2 class="records-title">旅行记录</h2>
						<span class="records-header-line"></span>
					</div>
					<div
						id="records-container"
						class="records-container"
					></div>
				</section>

				<section
					id="record-detail-section"
					class="record-detail-section"
					style="display: none"
				>
					<div class="record-detail-back">
						<button
							id="back-to-records"
							class="back-to-records-btn"
						>
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.5"
							>
								<line
									x1="19"
									y1="12"
									x2="5"
									y2="12"
								/>
								<polyline points="12 19 5 12 12 5" />
							</svg>
							返回记录列表
						</button>
					</div>
					<div class="record-detail-header">
						<div class="record-detail-header-row">
							<div>
								<h2
									id="record-detail-title"
									class="record-detail-title"
								></h2>
								<div class="record-detail-meta">
									<span id="record-detail-date"></span>
									<span class="meta-dot">·</span>
									<span id="record-detail-photos-count"></span> 张照片
								</div>
							</div>
							<div class="gallery-mode-toggle">
								<button
									id="mode-carousel"
									class="mode-btn active"
									title="轮播图模式"
								>
									<svg
										viewBox="0 0 24 24"
										fill="none"
										stroke="currentColor"
										stroke-width="1.5"
									>
										<rect
											x="2"
											y="4"
											width="20"
											height="16"
											rx="2"
										/>
										<polyline points="8 10 12 14 16 10" />
									</svg>
									<span>轮播</span>
								</button>
								<button
									id="mode-grid"
									class="mode-btn"
									title="平铺模式"
								>
									<svg
										viewBox="0 0 24 24"
										fill="none"
										stroke="currentColor"
										stroke-width="1.5"
									>
										<rect
											x="3"
											y="3"
											width="7"
											height="7"
											rx="1"
										/>
										<rect
											x="14"
											y="3"
											width="7"
											height="7"
											rx="1"
										/>
										<rect
											x="3"
											y="14"
											width="7"
											height="7"
											rx="1"
										/>
										<rect
											x="14"
											y="14"
											width="7"
											height="7"
											rx="1"
										/>
									</svg>
									<span>平铺</span>
								</button>
							</div>
						</div>
					</div>
					<div
						id="gallery-wrapper"
						class="gallery-wrapper"
					>
						<div
							id="gallery-carousel"
							class="gallery-carousel"
							style="display: none"
						>
							<div class="carousel-viewport">
								<div
									id="carousel-track"
									class="carousel-track"
								></div>
							</div>
							<button
								class="carousel-btn carousel-prev"
								id="carousel-prev"
							>
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
								>
									<polyline points="15 18 9 12 15 6" />
								</svg>
							</button>
							<button
								class="carousel-btn carousel-next"
								id="carousel-next"
							>
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
								>
									<polyline points="9 18 15 12 9 6" />
								</svg>
							</button>
							<div
								id="carousel-dots"
								class="carousel-dots"
							></div>
							<div class="carousel-counter">
								<span id="carousel-current">1</span> /
								<span id="carousel-total">1</span>
							</div>
						</div>
						<div
							id="record-gallery"
							class="record-gallery"
						></div>
					</div>
					<div
						id="record-text"
						class="record-text"
					></div>
				</section>

				<footer class="footer">
					<div class="footer-ornament">◆</div>
					<div class="footer-content">
						<p>© 2024 家庭旅游相册 · 足迹中国</p>
						<p>墨韵山水 · 水墨旅行志</p>
					</div>
				</footer>
			</main>
		</div>

		<audio
			id="bg-music"
			loop
		>
			<source
				src="https://cdn.pixabay.com/download/audio/2024/11/04/audio_4956b4ece1.mp3?filename=happy-upbeat-whistling-277321.mp3"
				type="audio/mpeg"
			/>
		</audio>

		<script src="script.js"></script>
		<script src="detail.js"></script>
	</body>
</html>
